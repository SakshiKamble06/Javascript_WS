<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .dot {
  height: 20px;
  width: 20px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 10px;
  cursor: pointer;
  border: 2px solid white;
}

    .red { background: red; }
.gray { background: gray; }
.black { background: black; }
button {
  padding: 10px 15px;
  border: none;
  margin-top: 10px;
  color: white;
  background: red;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  opacity: 0.8;
}
</style>
  </head>
  <body class="mt-5">
    <h2 class="text-center"><strong>Phone</strong></h2>
    <div class="container">
      <div class="card col-12 col-md-6 p-5 h-20 w-20 ">
        <img
          src="./iphone1.jpg"
          class="card-img-top border border-5 rounded-5 "
          alt="..."
        />
        <div class="card-body bg-danger-subtle text-danger-emphasis mt-2 ">
          <h3 class="card-title">iphone 17 Pro Max</h3>
          <p class="card-text">
            <i class="fa-solid fa-mobile"></i>
            <strong>Meomery Storage :</strong>256 GB: 17.42 cm (6.9″) Display
            with Promotion, <br />
            <strong>Brand </strong>: Apple <br /><strong>Front Camera:</strong>
            Cosmic Orange
          </p>
          <p class="card-text"><strong>₹1,49,900</strong></p>
          <p><strong>Color :</strong></p>
          <div class="colors">
      <span class="dot red" onclick="phoneImage"('red')"></span>
      <span class="dot gray" onclick="phoneImage"('gray')"></span>
      <span class="dot black" onclick="phoneImage"('black')"></span>
    </div>
          <button id="cartBtn" class="btn btn-primary p-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-cart-fill"
              viewBox="0 0 16 16"
            >
              <path
                d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"
              />
            </svg>
            Add to Cart
          </button>
        </div>
      </div>
     <div class="card col-12 col-md-6 p-5 h-20 w-20 ">
        <img
          src="./OnePlus1.jpg"
          class="card-img-top border border-5 rounded-5 "
          alt="..."
        />
        <div class="card-body bg-danger-subtle text-danger-emphasis mt-2 ">
          <h3 class="card-title">OnePlus 15</h3>
          <p class="card-text">
            <i class="fa-solid fa-mobile"></i>
            <strong>Meomery Storage :</strong>12GB+256GB
            <br />
            <strong>Brand </strong>:OnePlus <br /><strong>Front Camera:</strong>
            Triple 50MP Camera with 4K 120fps Dolby Vision
          </p>
          <p class="card-text"><strong> ₹72,999</strong></p>
          <p><strong>Color :</strong></p>
          <div class="colors">
      <span class="dot red" onclick="phoneImage"('red')"></span>
      <span class="dot gray" onclick="phoneImage"('gray')"></span>
      <span class="dot black" onclick="phoneImage"('black')"></span>
    </div>
          <button id="cartBtn" class="btn btn-primary p-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-cart-fill"
              viewBox="0 0 16 16"
            >
              <path
                d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"
              />
            </svg>
            Add to Cart
          </button>
        </div>
      </div>
    </div>
    <script>
function changePhone(color) {
  const img = document.getElementById("phoneImage");
  const tag = document.getElementById("tag");
  const btn = document.getElementById("cartBtn");

  const data = {
    red: {
      img: "iphone1.jpg",
      color: "red"
    },
    gray: {
      img: "iphone3.jpg",
      color: "gray"
    },
    black: {
      img: "iphone2.jpg",
      color: "black"
    }
  };

  img.src = data[color].img;
  tag.style.background = data[color].color;
  btn.style.background = data[color].color;
}
</script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
