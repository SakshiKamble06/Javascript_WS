<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
  </head>
  <body class="bg-primary">
     <div class="container w-50">
     <div class="row">
        <div class="col-12 col-md-6 p-5 mt-5">
         <h1 style="border-left: 5px solid white; color: white; padding-left: 9px; margin-top:20px;"> OTP <br>VERIFICATION <br>JAVASCRIPT</h1></button>
       </div>
        <div class="col-12 col-md-6 p-5  mt-5 " >
            <div class="container rounded bg-light p-4">
            <i class="bi bi-shield-lock-fill"></i>
         <p class="lead text-center">Enter OTP Code  </p>
         <div class="container">
            <div class="d-flex justify-content-around mb-2 ">
         <input type="test" size="1" id="FirstDigit" oninput="moveToNext('SecondD')" />
         <input type="test" size="1" id="SecondD" oninput="moveToNext('ThirdD')"/>
         <input type="test" size="1" id="ThirdD" oninput="moveToNext('FourthD')"/>
          <input type="test" size="1" id="FourthD" oninput="moveToNext('btnVerify')"/>
        </div>
         <button class="btn btn-primary w-100" onclick="VerifyOTP()" id="btnVerify"> Verify OTP</button>
        </div>
        </div>
        </div>
    </div>
     </div>

     <div class="container w-25" style="position: absolute; bottom: 20px; left: 20px;"><button onclick="generateOTP()">Genetate OTP</button></div>
    <script>
        function generateOTP(){
            otp = String(1000 + Math.floor(Math.random()*9000))
            alert(`Your OTP ${otp}`)
        }

function VerifyOTP(){

    optFirst = document.getElementById('FirstDigit').value
     optSecond = document.getElementById('SecondD').value
      optThird = document.getElementById('ThirdD').value
       optFourth = document.getElementById('FourthD').value

      
  
       otpFromUser = optFirst.value +  optSecond.value + optThird.value +  optFourth.value

       if(otp == otpFromUser){
        alert("Verified  Successfully ")
            }else{
        alert("Invalid OTP")
       }

            document.getElementById('FirstDigit').value = ''
            document.getElementById('SecondD').value = ''
            document.getElementById('ThirdD').value = ''
            document.getElementById('FourthD').value = ''
    }  

function moveToNext(nextElmt) {
    document.getElementById(nextElmt).focus()

}
   
    </script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
