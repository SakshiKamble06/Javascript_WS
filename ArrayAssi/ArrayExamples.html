    <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
        <h2>Assignment 1 . To Do List Manager</h2>
        <div class="container">
            <input type="text" id="inputAssgn1" />
            <button class="btn btn-primary" onclick="addToDos()">Add Task</button>
            <button class="btn btn-primary" onclick="clearAllToDo()">Clear All</button>
        </div>
        <div class="container" id="resultToDo"></div>
    </div>

    <script>
        toDos = []

        function renderToDos() {
            document.querySelector('#resultToDo').innerHTML = toDos.map((task, index) => `
                                    <div class='mb-1'>
                                        <b class='text-primary pe-5'>${task}</b>
                                        <button class='btn btn-danger'onclick='deleteTask(${index})'>DELETE</button>
                                    </div>
    `).join('')
        }


        function addToDos() {
            inputToDoElmt = document.querySelector('#inputAssgn1')
            newToDo = inputToDoElmt.value
            toDos.push(newToDo)
            // console.log(toDos)
            renderToDos()
            console.log(inputToDoElmt.value)
            inputToDoElmt.value = ''
            console.log(inputToDoElmt.value)

        }

        function clearAllToDo() {
            console.log(toDos)
            toDos = []
            renderToDos()
            console.log(toDos)
        }

        function deleteTask(i) {
            console.log(i)
            toDos.splice(i, 1)
            renderToDos()
        }

    </script>

    <section>

            <h2>Assignment 2 . Marks Calculator</h2>
            <div class="container">
                <input type="text" id="inputAssgnMarks" />

    <script>
        inputAssgnMarksELMT = document.querySelector('#inputAssgnMarks')
        marksArray = []
        function addMarks() {
            inputMark = inputAssgnMarksELMT.value
            inputNum = parseInt(inputMark)
            if (isNaN(inputNum)) {
                alert("Enter valid Number")
            } else {
                marksArray.push(inputNum)
                console.log(marksArray)
            }
            inputAssgnMarksELMT.value = ''
        }
        function Reset() {
            marksArray = []
        }
        function Calculate() {
            // totalMarks = 0
            // for(i=0;i<marksArray.length;i++){
            //     totalMarks += marksArray[i]
            // }

            totalMarks1 = marksArray.reduce((totalMarks, mark) => totalMarks + mark, 0)
            avg = totalMarks1 / marksArray.length
            console.log(totalMarks1, avg)

            MaxNum = 0

            for (i = 0; i < marksArray.length; i++) {
                // MaxNum = marksArray[i]
                if (marksArray[i] > MaxNum) {
                    MaxNum = marksArray[i]
                }
            }

            // for(i=0;i<marksArray.legth;i++){
            //     if(marksArray[i] > marksArray[i+1] ){
            //         newMax = marksArray[i]
            //     }else{
            //         newMax = marksArray[i+1]
            //     }
            // }

            MinNum = Infinity

            for (i = 0; i < marksArray.length; i++) {
                // MaxNum = marksArray[i]
                if (marksArray[i] < MinNum) {
                    MinNum = marksArray[i]
                }
            }
            document.querySelector('#resultMarks').innerHTML = `
                                <div class='bg-light border-1 rounded mt-3 p-3'>
                                Total Marks =  ${totalMarks1}  <br />
                                Average = ${avg} <br />
                                Highest Marks = ${MaxNum} <br />
                                Lowest Marks = ${MinNum}
                                </div>
            `

        }

    </script>

        console.log(EvenOdd)
      }

      function showEven() {
        let result = "";

        result=EvenOdd.filter(number=>(number%2==0))

      function showOdd() {

        //   if (EvenOdd[i] % 2 != 0) {
        //     result += EvenOdd[i] + " , ";

        result=EvenOdd.filter(number=>(number%2!=0))

 <section>
      <div class="container w-75 rounded m-5 p-3 bg-secondary-subtle" style="background-color: rgb(223, 223, 223); height: 300px;">
        <h2>Assignment 5 - Sort names Alphabetically</h2>

        <div class="mb-3">
          <input type="text" id="inputNames" placeholder="Enter a name" />

          <button class="btn btn-primary" onclick="addName()">
            Add Name
          </button>
          <button class="btn btn-primary" onclick="sortNames()">
            Sort
          </button>
          <button class="btn btn-primary" onclick="resetNames()">Reset</button>

        <div class="container" id="SortArray"></div>


        </div>

        
      </div>
    </section>

    <script>
    namesArr = []

    function addName(){
        let inputNamesEle = document.querySelector('#inputNames')
        let inNames = inputNamesEle.value
        namesArr.push(inNames)
        inputNamesEle.value=""
        console.log(namesArr)
    }

    function sortNames(){
        let sortedNames = namesArr.sort(function(a,b){
            return a.toLowerCase().localeCompare(b.toLowerCase());
        })

        document.querySelector('#SortArray').innerHTML = sortedNames;
    }

    function resetNames(){
        namesArr=[]
        document.querySelector('#SortArray').innerHTML=""
        document.querySelector('#inputNames').value=""
    }
</script>
