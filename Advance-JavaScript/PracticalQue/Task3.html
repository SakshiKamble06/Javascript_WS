
<!DOCTYPE html>
<html>
<head>
    <title>1 Minute Timer</title>
</head>
<body>

<h1 id="timer">60</h1>

<script>
let time = 60;

let interval = setInterval(function () {
    time--;
    document.getElementById("timer").innerText = time;

    if (time === 0) {
        clearInterval(interval);
        alert("Time's up!");
    }
}, 1000);
</script>

</body>
</html>
