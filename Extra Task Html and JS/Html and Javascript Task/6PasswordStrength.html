
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Strength Checker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#eef2f7;
}

.card {
    border-radius: 15px;
}

.strength {
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-6 col-lg-4 col-sm-10">

      <div class="card shadow p-4 text-center">
        <h3 class="mb-3">Password Checker</h3>

        <input type="password" id="pass" class="form-control" placeholder="Enter Password" onkeyup="checkStrength()">

        <div id="result" class="strength"></div>

      </div>

    </div>

  </div>
</div>

<script>
function checkStrength(){

    let pass = document.getElementById("pass").value;
    let result = document.getElementById("result");

   
    let strong = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[@#$%^&*]).{8,}$/;
    let medium = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;

    if(pass.length === 0){
        result.innerText = "";
    }
    else if(strong.test(pass)){
        result.innerText = "Strong";
        result.className = "strength text-success";
    }
    else if(medium.test(pass)){
        result.innerText = "Medium";
        result.className = "strength text-warning";
    }
    else{
        result.innerText = "Weak";
        result.className = "strength text-danger";
    }
}
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
