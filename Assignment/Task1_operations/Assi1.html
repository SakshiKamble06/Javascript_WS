<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
<style>
    p{
        color: green;
        font-size: 20px;
    }
</style>
</head>
<body>
<p>Addition <span id="add"></span></p>
<p>Subtraction <span id="sub"></span></p>
<p>Multipliaction <span id="mult"></span></p>
<p>Division <span id="div"></span></p>
<p>Modulas <span id="Mod"></span></p>



<script>
  let  n1 = prompt("Enter number one")
   let  n2 = prompt("Enter number Two")
    document.getElementById('add').textContent = Number(n1)+Number(n2)
    document.getElementById('sub').textContent = Number(n1)-Number(n2)
    document.getElementById('mult').textContent = Number(n1)*Number(n2)
    document.getElementById('div').textContent = Number(n1)/Number(n2)
    document.getElementById('Mod').textContent = Number(n1)%Number(n2)
    </script>
</body>
</html>
