<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Discount</title>
</head>
<body>

<script>

let total = prompt("Enter total amount:");
total = Number(total);

if (total > 100) {
    total -= total * 0.10;   // 10% discount using assignment operator
}

document.write("Discounted total: " + total);

</script>
</body>
</html>
