<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of digit </title>
    
</head>
<body>
    <p id="result"></p>
    <script>
        
        let n = Number(prompt("Enter a number :"))  
        // fline += "Enter a number" +n    
        sum= 0 
        do {
              let num = n%10 ;
                  sum = sum+ num;
                   n = Math.floor(n/10);
        }while(n!=0)
        document.getElementById ("result").innerHTML= "Sum of the given number : " +sum 
    </script>
    
</body>
</html>
