<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armstrong Number</title>
  </head>
  <body>
    <script>
      let num = Number(prompt("Enter a number:"));
      let original = num;
      let sum = 0;

      while (num > 0) {
        let digit = num % 10;
        sum = sum + digit * digit * digit;

        num = Math.floor(num / 10);
      }

      if (sum == original) {
        document.write(original + " is an Armstrong Number");
      } else {
        document.write(original + " is NOT an Armstrong Number");
      }
    </script>
  </body>
</html>
