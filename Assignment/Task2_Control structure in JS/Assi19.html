<!DOCTYPE html>
<html>
<head>
<title>Armstrong Number</title>
</head>

<body>

<h2>Armstrong Number Checker</h2>

<label>Enter Number:</label>
<input type="number" id="num">
<button onclick="check()">Check</button>

<p id="result"></p>

<script>

function check()
{
    let num = document.getElementById("num").value;
    let temp = num;
    let sum = 0;

    while(temp > 0)
    {
        let rem = temp % 10;
        sum += rem * rem * rem;
        temp = Math.floor(temp / 10);
    }

    if(sum == num)
        document.getElementById("result").innerHTML = "It is an Armstrong Number";
    else
        document.getElementById("result").innerHTML = "It is NOT an Armstrong Number";
}

</script>

</body>
</html>
