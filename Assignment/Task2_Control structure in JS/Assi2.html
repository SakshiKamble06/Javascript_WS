<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Table create</title>
</head>
<body>
  <script>
    let num = Number(prompt("Enter the number which you want to create table"))
    for(i=1; i<=10; i++){
        let  result = num * i;
     document.write( num +"*"+ i + "=" + result +"<br>")
        
    }
  </script>  
</body>
</html>
