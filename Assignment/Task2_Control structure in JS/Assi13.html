<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 13 </title>
</head>
<body>
    <script>

        SumofEven=0
        SumofOdd =0
        for (i=1;i<=100; i++){
            if(i%2==0){
                SumofEven+=i
            }
        }
        document.write("The sum of even numbers : "+SumofEven +"<br>")

        for (i=1;i<=100; i++){
            if(i %2!=0){
                SumofOdd+=i
            }
        }
        document.write("The sum of odd numbers : "+SumofOdd)
    </script>
</body>
</html>
