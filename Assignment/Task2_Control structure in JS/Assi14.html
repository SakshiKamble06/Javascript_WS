<body>

<h2>Factorial</h2>

<script>
let num = Number(prompt("Enter a number"))
document.write("Enter a number : " + num + "<br>")

let factorial = 1
let i = 1

while(i <= num){
    factorial *= i
    i++
}

document.write("Factorial of " + num + " is : " + factorial)
</script>

</body>
</html>
