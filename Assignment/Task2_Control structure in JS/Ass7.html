<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime number Checker </title>
</head>
<body>
    <p>Prime number cheker</p>
    <p id="result"></p>
    <script>
        let n = Number(prompt("Enter a number :"));
        let isPrime = true;
   
        // document.write(" Enter a number :"+n)
       if(num<=1){
        isPrime = false;
       }else {
        for(let i=2; i< n;i++){
            if(num % i ===0){
                isPrime = false;
                break;
            }
        }
        
       }
     if(isPrime){
                document.getElementById("result").innerHTML=
                n+ " is  a prime number. ";
            }
            else{

                document.getElementById("result").innerHTML=
                n +" is not a prime number.";
         }
    </script>
</body>
</html>
