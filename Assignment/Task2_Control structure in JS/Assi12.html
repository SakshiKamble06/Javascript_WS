<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Reversed  number</p>
    <script>
        let n=prompt("Enter a number : ")
        document.write("Enter a number : "+n +"<br>")
        let rev =" "
        let i=n.length-1
        while(i>=0){
            rev =rev+n[i]
            i--
        }
        document.write("Reversed number is : "+rev)
    </script>
</body>
</html>
