<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibonacci Series</title>
  </head>
  <body>
    <script>
      let n = Number(prompt("Enter number of terms:"));

      let a = 0;
      let b = 1;

      document.write("Fibonacci Series: <br>");
      document.write(a + " " + b + " ");

      for (i = 3; i <= n; i++) {
        let c = a + b;
        document.write(c + " ");

        a = b;
        b = c;
      }
    </script>
  </body>
</html>
