<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4 text-center" style="width:420px">

<h3 class="mb-4">Calculator</h3>

<!-- Input boxes side by side -->
<div class="row mb-3">
    <div class="col">
        <input type="number" id="num1" class="form-control" placeholder="Number 1">
    </div>

    <div class="col">
        <input type="number" id="num2" class="form-control" placeholder="Number 2">
    </div>
</div>

<!-- Buttons -->
<div class="d-flex justify-content-between mb-3">
    <button class="btn btn-primary" onclick="calculate('add')">Add</button>
    <button class="btn btn-primary" onclick="calculate('sub')">Subtract</button>
    <button class="btn btn-primary" onclick="calculate('mul')">Multiply</button>
    <button class="btn btn-primary" onclick="calculate('div')">Divide</button>
</div>

<h4>Result: <span id="result">0</span></h4>

</div>

<script>

const calculator={
    add:(a,b)=>a+b,
    subtract:(a,b)=>a-b,
    multiply:(a,b)=>a*b,
    divide:(a,b)=>a/b
}

function calculate(op){

let n1=Number(document.getElementById("num1").value)
let n2=Number(document.getElementById("num2").value)

let res

if(op=="add") res=calculator.add(n1,n2)
if(op=="sub") res=calculator.subtract(n1,n2)
if(op=="mul") res=calculator.multiply(n1,n2)
if(op=="div") res=calculator.divide(n1,n2)

document.getElementById("result").innerText=res

}

</script>

</body>
</html>
