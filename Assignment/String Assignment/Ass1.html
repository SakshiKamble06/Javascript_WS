<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Of Vowels</title>
</head>
<body>
    <script>
        let str=String(prompt("Enter the String"))
        let vowels="aeiouAEIOU"
        let vowelCount=0;
        

        for(let i=0;i<str.length;i++){
            let ch=str.charAt(i)

            if(vowels.includes(ch)){
                vowelCount++;
            }
        }

        document.write("String: " + str + "<br>");
        document.write("The number of vowels in the string is : "+vowelCount + "<br>")

    </script>
</body>
</html>
