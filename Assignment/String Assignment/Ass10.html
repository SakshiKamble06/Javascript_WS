<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let str=String(prompt("Enter a string"))
        
            if(str.length===0){
                document.write("The string is empty")
            }
            else if(str[0]===str[str.length-1]){
                document.write("The string starts and ends with same character")
                
            }else{
                document.write("The string starts and ends with different character")  
            }
        
    </script>
</body>
</html>
