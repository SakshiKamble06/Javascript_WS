<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let sentence=String(prompt("Enter the sentence"))
        let space=sentence.indexOf(" ")
        let firstWord=sentence.substring(0,space)
        document.write("The first word from the sentence is : "+firstWord)

    </script>
</body>
</html>
