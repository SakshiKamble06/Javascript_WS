<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Palindrome</title>
</head>
<body>
    <script>
        let str=String(prompt("Enter the word"))
        let reverseStr=""
        for(let i=str.length-1;i>=0;i--){
            reverseStr+=str[i]
        }

        if(str===reverseStr){
            document.write("The string is palindrome")
        }else{
            document.write("The string is not palindrome")
        }
    </script>
</body>
</html>
